name: Cross-Platform Build CI

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  build:
    name: Build on ${{ matrix.os }} (${{ matrix.build-method }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        build-method: [cmake, direct]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # 1. Pasang dependensi tambahan grafis & windowing (Khusus untuk Linux Ubuntu)
    - name: Install Linux Graphic Dependencies
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential \
          libx11-dev libxext-dev libxrandr-dev libxinerama-dev \
          libxcursor-dev libxi-dev libxss-dev libgl1-mesa-dev \
          libdbus-1-dev libasound2-dev libpulse-dev libudev-dev \
          libxtst-dev libxkbcommon-dev

    # 2. Unduh Pustaka Eksternal (SDL3 & SQLite Amalgamation) ke folder local external/
    - name: Download External Libraries (SDL3 & SQLite) (Unix)
      if: matrix.os != 'windows-latest'
      shell: bash
      run: |
        chmod +x scripts/setup_compiler.sh
        ./scripts/setup_compiler.sh

    - name: Download External Libraries & Compiler (Windows)
      if: matrix.os == 'windows-latest'
      shell: cmd
      run: |
        call scripts\setup_compiler.bat

    # 3. Setup Lingkungan Khusus untuk Build Tanpa CMake
    - name: Setup System SDL3 for Direct Build (macOS)
      if: matrix.os == 'macos-latest' && matrix.build-method == 'direct'
      run: brew install sdl3

    - name: Build and Install SDL3 from Source for Direct Build (Linux)
      if: matrix.os == 'ubuntu-latest' && matrix.build-method == 'direct'
      run: |
        cmake -S external/sdl3 -B build_sdl -DCMAKE_BUILD_TYPE=Release
        cmake --build build_sdl
        sudo cmake --install build_sdl

    # 4. Jalankan Pembangunan Berdasarkan Metode
    - name: Build with CMake
      if: matrix.build-method == 'cmake'
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Release
        cmake --build build --config Release

    - name: Build without CMake (Direct Build)
      if: matrix.build-method == 'direct'
      shell: bash
      run: |
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          # Tambahkan compiler w64devkit ke PATH
          export PATH="$GITHUB_WORKSPACE/external/w64devkit/bin:$PATH"
          ./scripts/build.bat direct
        else
          chmod +x scripts/build.sh
          ./scripts/build.sh direct
        fi
